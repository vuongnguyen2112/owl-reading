<header class="page-header">
  <div>
    <p class="eyebrow">Novels</p>
    <h1>{{ isEditing() ? 'Edit novel' : 'Create novel' }}</h1>
  </div>
  <a mat-button routerLink="/novels">Back to list</a>
</header>

@if (state().loading) {
<section class="state-panel">
  <mat-spinner diameter="36"></mat-spinner>
</section>
} @else {
<mat-card class="form-card">
  <mat-card-content>
    @if (state().error) {
    <p class="error-copy">{{ state().error }}</p>
    }

    <form class="novel-form" (ngSubmit)="saveNovel()">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input
          matInput
          maxlength="200"
          name="title"
          required
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Slug</mat-label>
        <input
          matInput
          maxlength="220"
          name="slug"
          [ngModel]="slug()"
          (ngModelChange)="slug.set($event)"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Status</mat-label>
        <mat-select
          name="status"
          [ngModel]="status()"
          (ngModelChange)="status.set($event)"
        >
          @for (option of statuses; track option) {
          <mat-option [value]="option">{{ option }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Description</mat-label>
        <textarea
          matInput
          maxlength="4000"
          name="description"
          rows="6"
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
        ></textarea>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Cover image URL</mat-label>
        <input
          matInput
          maxlength="1000"
          name="coverImageUrl"
          [ngModel]="coverImageUrl()"
          (ngModelChange)="coverImageUrl.set($event)"
        />
      </mat-form-field>

      <div class="form-actions">
        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="saving()"
        >
          {{ saving() ? 'Saving...' : 'Save novel' }}
        </button>
        <a mat-button routerLink="/novels">Cancel</a>
      </div>
    </form>
  </mat-card-content>
</mat-card>
}
