packages:
  - 'apps/*'
  - 'libs/*'
  - 'admin-dashboard'
  - 'admin-dashboard-e2e'
  - 'api'
  - 'api-e2e'
  - 'shared-types'
  - 'shared-ui'

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@parcel/watcher'
  - '@prisma/engines'
  - '@swc/core'
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - prisma
  - unrs-resolver

ignoredBuiltDependencies:
  - '@scarf/scarf'

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  prisma: true
  unrs-resolver: true
